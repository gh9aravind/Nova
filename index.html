<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ── API KEY SCREEN ── */
        #apiScreen {
            width: 100%;
            max-width: 420px;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #apiScreen h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        #apiScreen p {
            font-size: 13px;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        #apiScreen a { color: #00d2ff; text-decoration: none; }
        #apiKeyInput {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #0f3460;
            border-radius: 10px;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            font-family: monospace;
            letter-spacing: 1px;
        }
        #apiKeyInput:focus { border-color: #7b2ff7; }
        #apiKeyInput::placeholder { color: #444; letter-spacing: 0; font-family: sans-serif; }
        #saveKeyBtn {
            padding: 14px;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #saveKeyBtn:hover { opacity: 0.9; }
        .api-note {
            background: #0f3460;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 12px;
            color: #aac;
            line-height: 1.7;
        }

        /* ── CHAT SCREEN ── */
        #chatScreen {
            display: none;
            width: 100%;
            max-width: 700px;
            height: 92vh;
            background: #1a1a2e;
            border-radius: 16px;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 {
            font-size: 19px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-btns {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .hbtn {
            font-size: 12px;
            padding: 6px 11px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .hbtn:hover { border-color: #7b2ff7; color: #ddd; }
        .hbtn.active {
            background: linear-gradient(135deg, #00d2ff22, #7b2ff733);
            border-color: #7b2ff7;
            color: #00d2ff;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

        .message {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 14px;
            line-height: 1.55;
            font-size: 14.5px;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #0f3460, #533483);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .bot-msg {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 14px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid #0f3460;
            border-radius: 10px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .input-area input:focus { border-color: #533483; }
        .input-area input::placeholder { color: #555; }
        .ibtn {
            padding: 11px 16px;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.1s;
        }
        .ibtn:hover { opacity: 0.9; }
        .ibtn:active { transform: scale(0.96); }
        .ibtn:disabled { opacity: 0.4; cursor: not-allowed; }
        #micBtn {
            font-size: 17px;
            padding: 11px 13px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            flex-shrink: 0;
        }
        #micBtn.listening {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border-color: transparent;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,65,108,0.5); }
            50%      { box-shadow: 0 0 0 8px rgba(255,65,108,0); }
        }

        .typing {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 11px 18px;
            display: flex;
            gap: 4px;
        }
        .typing span {
            width: 7px; height: 7px;
            background: #7b2ff7;
            border-radius: 50%;
            animation: bounce 1.3s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,80%,100% { transform:scale(0.6); opacity:0.4; }
            40% { transform:scale(1); opacity:1; }
        }
    </style>
</head>
<body>

<!-- ══ API KEY SETUP SCREEN ══ -->
<div id="apiScreen">
    <h2>✦ My AI — Setup</h2>
    <p>
        Google Gemini API key paste ചെയ്യൂ.<br>
        Free key: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
    </p>
    <input type="text" id="apiKeyInput" placeholder="AIza...  ← ഇവിടെ paste ചെയ്യൂ">
    <button id="saveKeyBtn">Save &amp; Start Chat →</button>
    <div class="api-note">
        🔒 Key നിങ്ങളുടെ device-ൽ മാത്രം save ആകും.<br>
        💸 Google Gemini free tier — ദിവസം 1500 requests.<br>
        🗑 Key മാറ്റണമെങ്കിൽ chat-ൽ ⚙️ Settings ക്ലിക്ക് ചെയ്യൂ.
    </div>
</div>

<!-- ══ CHAT SCREEN ══ -->
<div id="chatScreen">
    <div class="header">
        <h1>✦ My AI</h1>
        <div class="header-btns">
            <button class="hbtn" id="speakToggle">🔊 Voice</button>
            <button class="hbtn" id="settingsBtn">⚙️ Key</button>
        </div>
    </div>
    <div class="messages" id="messages">
        <div class="message bot-msg">👋 Hello! എന്തെങ്കിലും ചോദിക്കൂ!</div>
    </div>
    <div class="input-area">
        <button class="ibtn" id="micBtn">🎤</button>
        <input type="text" id="userInput" placeholder="Type or tap 🎤 to speak...">
        <button class="ibtn" id="sendBtn">Send</button>
    </div>
</div>

<script>
    // ── Elements ──
    const apiScreen   = document.getElementById('apiScreen');
    const chatScreen  = document.getElementById('chatScreen');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn  = document.getElementById('saveKeyBtn');
    const messagesEl  = document.getElementById('messages');
    const userInput   = document.getElementById('userInput');
    const sendBtn     = document.getElementById('sendBtn');
    const micBtn      = document.getElementById('micBtn');
    const speakToggle = document.getElementById('speakToggle');
    const settingsBtn = document.getElementById('settingsBtn');

    // ── Init: check saved key ──
    let apiKey = localStorage.getItem('gemini_api_key') || '';
    if (apiKey) showChat();

    saveKeyBtn.addEventListener('click', () => {
        const val = apiKeyInput.value.trim();
        if (!val) { alert('API key enter ചെയ്യൂ!'); return; }
        apiKey = val;
        localStorage.setItem('gemini_api_key', apiKey);
        showChat();
    });

    apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKeyBtn.click(); });

    settingsBtn.addEventListener('click', () => {
        apiScreen.style.display = 'flex';
        chatScreen.style.display = 'none';
        apiKeyInput.value = apiKey;
    });

    function showChat() {
        apiScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        userInput.focus();
    }

    // ── Voice Output ──
    let speakEnabled = false;
    speakToggle.addEventListener('click', () => {
        speakEnabled = !speakEnabled;
        speakToggle.classList.toggle('active', speakEnabled);
        speakToggle.textContent = speakEnabled ? '🔊 On' : '🔊 Voice';
    });

    function speakText(text) {
        if (!speakEnabled) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 1;
        window.speechSynthesis.speak(u);
    }

    // ── Voice Input ──
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null, isListening = false;

    if (SR) {
        recognition = new SR();
        recognition.lang = 'ml-IN';   // Malayalam; change to 'en-US' if needed
        recognition.interimResults = true;
        recognition.continuous = false;

        recognition.onresult = e => {
            const t = Array.from(e.results).map(r => r[0].transcript).join('');
            userInput.value = t;
            if (e.results[e.results.length - 1].isFinal) stopMic(), handleSend();
        };
        recognition.onerror = stopMic;
        recognition.onend   = stopMic;

        micBtn.addEventListener('click', () => {
            if (isListening) { recognition.stop(); stopMic(); }
            else { userInput.value=''; recognition.start(); isListening=true; micBtn.classList.add('listening'); micBtn.textContent='⏹'; }
        });
    } else {
        micBtn.disabled = true; micBtn.style.opacity = '0.3';
    }

    function stopMic() {
        isListening = false;
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
    }

    // ── Conversation history ──
    const history = [];

    // ── Gemini API Call ──
    async function getBotResponse(userMsg) {
        history.push({ role: 'user', parts: [{ text: userMsg }] });

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    
                    contents: history
                })
            }
        );

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || 'API Error');
        }

        const data  = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(No response)';
        history.push({ role: 'model', parts: [{ text: reply }] });
        return reply;
    }

    // ── UI helpers ──
    function addMessage(text, sender) {
        const d = document.createElement('div');
        d.className = `message ${sender}-msg`;
        d.textContent = text;
        messagesEl.appendChild(d);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const d = document.createElement('div');
        d.className = 'typing'; d.id = 'typing';
        d.innerHTML = '<span></span><span></span><span></span>';
        messagesEl.appendChild(d);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
        document.getElementById('typing')?.remove();
    }

    // ── Send ──
    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        userInput.value = '';
        userInput.focus();
        sendBtn.disabled = true;
        showTyping();
        try {
            const reply = await getBotResponse(text);
            hideTyping();
            addMessage(reply, 'bot');
            speakText(reply);
        } catch (err) {
            hideTyping();
            addMessage('⚠️ ' + err.message, 'bot');
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
