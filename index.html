<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;align-items:center;}

  /* KEY SCREEN */
  #keyScreen{width:92%;max-width:400px;background:#151528;border-radius:20px;padding:32px 24px;display:flex;flex-direction:column;gap:18px;box-shadow:0 8px 40px #00000088;}
  #keyScreen h2{text-align:center;font-size:22px;background:linear-gradient(135deg,#00d2ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #keyScreen p{font-size:13px;color:#888;text-align:center;line-height:1.7;}
  #keyScreen a{color:#00d2ff;}
  #keyInput{padding:13px 14px;border:1.5px solid #2a2a4a;border-radius:10px;background:#0d0d1a;color:#e0e0e0;font-size:13px;font-family:monospace;outline:none;width:100%;}
  #keyInput:focus{border-color:#a855f7;}
  #keyInput::placeholder{font-family:sans-serif;color:#444;}
  #startBtn{padding:13px;background:linear-gradient(135deg,#00d2ff,#a855f7);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  .note{background:#1a1a3a;border-radius:10px;padding:12px;font-size:12px;color:#99a;line-height:1.8;}

  /* CHAT SCREEN */
  #chatScreen{display:none;width:100%;max-width:680px;height:95vh;background:#151528;border-radius:16px;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px #00000088;}
  .hdr{padding:14px 18px;background:#11112a;border-bottom:1px solid #1e1e3a;display:flex;align-items:center;gap:10px;}
  .hdr h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#00d2ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hdr-btns{margin-left:auto;display:flex;gap:7px;}
  .hbtn{font-size:12px;padding:6px 11px;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:8px;color:#aaa;cursor:pointer;transition:.2s;}
  .hbtn:hover,.hbtn.on{border-color:#a855f7;color:#c084fc;}

  .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
  .msgs::-webkit-scrollbar{width:4px;}
  .msgs::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px;}

  .msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;animation:pop .2s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .u{align-self:flex-end;background:linear-gradient(135deg,#1e3a5f,#3b1d6e);color:#fff;border-bottom-right-radius:4px;}
  .b{align-self:flex-start;background:#1a1a35;border:1px solid #2a2a4a;border-bottom-left-radius:4px;}

  .typing{align-self:flex-start;background:#1a1a35;border:1px solid #2a2a4a;border-radius:12px;padding:10px 16px;display:flex;gap:4px;}
  .typing span{width:6px;height:6px;background:#a855f7;border-radius:50%;animation:dot 1.2s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,80%,100%{transform:scale(.5);opacity:.4;}40%{transform:scale(1);opacity:1;}}

  .inp-area{padding:12px 14px;background:#11112a;border-top:1px solid #1e1e3a;display:flex;gap:8px;align-items:center;}
  .inp-area input{flex:1;padding:11px 14px;border:1.5px solid #2a2a4a;border-radius:10px;background:#0d0d1a;color:#e0e0e0;font-size:14px;outline:none;transition:.2s;}
  .inp-area input:focus{border-color:#a855f7;}
  .inp-area input::placeholder{color:#555;}
  .ibtn{padding:11px 14px;background:linear-gradient(135deg,#00d2ff,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .ibtn:hover{opacity:.9;}
  .ibtn:disabled{opacity:.4;cursor:not-allowed;}
  #micBtn{background:#0d0d1a;border:1.5px solid #2a2a4a;font-size:17px;padding:11px 13px;}
  #micBtn.on{background:linear-gradient(135deg,#ff4b2b,#ff416c);border-color:transparent;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ff4b2b44;}50%{box-shadow:0 0 0 8px #ff4b2b00;}}
</style>
</head>
<body>

<!-- KEY SCREEN -->
<div id="keyScreen">
  <h2>✦ My AI</h2>
  <p>Google Gemini Free API Key paste ചെയ്യൂ<br>
  👉 <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> → Get API Key</p>
  <input id="keyInput" type="text" placeholder="AIzaSy... ← ഇവിടെ paste ചെയ്യൂ">
  <button id="startBtn">Start Chat →</button>
  <div class="note">
    🔒 Key ഈ device-ൽ മാത്രം save ആകും<br>
    💸 Free — ദിവസം 1500 requests<br>
    ⚙️ Key മാറ്റാൻ chat-ൽ Key button ഉണ്ട്
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <div class="hdr">
    <h1>✦ My AI</h1>
    <div class="hdr-btns">
      <button class="hbtn" id="voiceBtn">🔊 Voice</button>
      <button class="hbtn" id="keyBtn">⚙️ Key</button>
    </div>
  </div>
  <div class="msgs" id="msgs">
    <div class="msg b">👋 Hello! എന്തെങ്കിലും ചോദിക്കൂ!</div>
  </div>
  <div class="inp-area">
    <button class="ibtn" id="micBtn">🎤</button>
    <input type="text" id="inp" placeholder="Type or tap 🎤 to speak...">
    <button class="ibtn" id="sendBtn">Send</button>
  </div>
</div>

<script>
const keyScreen = document.getElementById('keyScreen');
const chatScreen = document.getElementById('chatScreen');
const keyInput = document.getElementById('keyInput');
const startBtn = document.getElementById('startBtn');
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const voiceBtn = document.getElementById('voiceBtn');
const keyBtn = document.getElementById('keyBtn');

// Load saved key
let KEY = localStorage.getItem('g_key') || '';
if (KEY) openChat();

startBtn.onclick = () => {
  const k = keyInput.value.trim();
  if (!k) { alert('API Key enter ചെയ്യൂ!'); return; }
  KEY = k;
  localStorage.setItem('g_key', KEY);
  openChat();
};
keyInput.onkeydown = e => { if (e.key==='Enter') startBtn.click(); };
keyBtn.onclick = () => { keyScreen.style.display='flex'; chatScreen.style.display='none'; keyInput.value=KEY; };

function openChat() {
  keyScreen.style.display = 'none';
  chatScreen.style.display = 'flex';
  inp.focus();
}

// Voice output
let tts = false;
voiceBtn.onclick = () => { tts=!tts; voiceBtn.classList.toggle('on',tts); voiceBtn.textContent=tts?'🔊 On':'🔊 Voice'; };
function speak(t) { if(!tts) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.speak(u); }

// Voice input
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec=null, listening=false;
if(SR) {
  rec = new SR();
  rec.lang='ml-IN';
  rec.interimResults=true;
  rec.onresult = e => { inp.value=Array.from(e.results).map(r=>r[0].transcript).join(''); if(e.results[e.results.length-1].isFinal){stopMic();send();} };
  rec.onerror = stopMic; rec.onend = stopMic;
  micBtn.onclick = () => { if(listening){rec.stop();stopMic();}else{inp.value='';rec.start();listening=true;micBtn.classList.add('on');micBtn.textContent='⏹';} };
} else { micBtn.disabled=true; micBtn.style.opacity='.3'; }

function stopMic() { listening=false; micBtn.classList.remove('on'); micBtn.textContent='🎤'; }

// History
const history = [];

// Gemini API - using gemini-pro (most compatible)
async function ask(text) {
  history.push({ role:'user', parts:[{ text }] });
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KEY}`,
    { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents: history }) }
  );
  if(!res.ok) {
    const e = await res.json();
    throw new Error(e.error?.message || 'API Error');
  }
  const data = await res.json();
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(No response)';
  history.push({ role:'model', parts:[{ text:reply }] });
  return reply;
}

function addMsg(text, who) {
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const d=document.createElement('div'); d.className='typing'; d.id='typing';
  d.innerHTML='<span></span><span></span><span></span>';
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function send() {
  const text = inp.value.trim();
  if (!text) return;
  addMsg(text, 'u');
  inp.value=''; inp.focus();
  sendBtn.disabled=true;
  showTyping();
  try {
    const reply = await ask(text);
    hideTyping();
    addMsg(reply, 'b');
    speak(reply);
  } catch(err) {
    hideTyping();
    addMsg('⚠️ ' + err.message, 'b');
  } finally {
    sendBtn.disabled=false;
  }
}

sendBtn.onclick = send;
inp.onkeydown = e => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
